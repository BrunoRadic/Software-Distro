version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: software-distro-minio
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console (web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: software-distro-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: software_distro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  minio_data:
  postgres_data:

networks:
  app-network:
    driver: bridge